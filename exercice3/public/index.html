<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Bouton Responsive Sass + Tailwind</title>
    <!-- Le fichier final produit compilera Sass & Tailwind -->
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Test des Boutons Responsifs</h1>
        
        <p class="text-gray-600 mb-8 mx-auto">
            Voici les boutons générés par notre mixin Sass. Redimensionnez la fenêtre pour voir la largeur et les paddings s'ajuster grâce aux Media Queries internes. Sur mobile (en dessous de 768px), ils prennent <span class="font-semibold">100% de la largeur</span>.
        </p>

        <div class="flex flex-col md:flex-row items-center justify-center gap-4">
            <!-- Utilisation des classes Sass personnalisées -->
            <button class="btn-primary">
                Accepter & Continuer
            </button>
            
            <button class="btn-secondary">
                Plus d'informations
            </button>
        </div>
    </div>

</body>
</html>
