<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Modulaire Tailwind</title>
  <link href="./css/output.css" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen font-sans text-gray-900">

  <!-- Topbar -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">⚡</span>
        <h1 class="text-xl font-extrabold tracking-tight text-gray-900">Dashboard Modulaire</h1>
        <span class="text-xs bg-indigo-100 text-indigo-700 font-bold px-2 py-0.5 rounded-full">Tailwind Plugin</span>
      </div>
      <div class="flex items-center gap-3">
        <button
          id="btn-add-widget"
          class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-lg transition-colors shadow-sm cursor-pointer"
          onclick="addNotificationsWidget()">
          + Ajouter Notifications
        </button>
        <button
          class="text-sm bg-red-100 hover:bg-red-200 text-red-600 font-semibold px-4 py-2 rounded-lg transition-colors cursor-pointer"
          onclick="resetDashboard()">
          🔄 Reset layout
        </button>
      </div>
    </div>
  </header>

  <!-- Dashboard Container -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <p class="text-gray-500 text-sm mb-6">
      Glissez-déposez les widgets pour réorganiser le tableau de bord. Votre agencement est <strong>persisté automatiquement</strong>.
    </p>
    <div id="dashboard-root"></div>
  </main>

  <!-- Core -->
  <script src="./js/core/registry.js"></script>
  <script src="./js/core/eventBus.js"></script>

  <!-- Widgets -->
  <script src="./js/widgets/stats.js"></script>
  <script src="./js/widgets/table.js"></script>
  <script src="./js/widgets/chutier.js"></script>
  <script src="./js/widgets/notifications.js"></script>

  <!-- Data + Dashboard Engine -->
  <script src="./js/data.js"></script>
  <script src="./js/core/dashboard.js"></script>

  <script>
    // Initialisation principale
    document.addEventListener('DOMContentLoaded', () => {
      Dashboard.render('dashboard-root', dashboardConfig);
    });

    // Bonus: Ajouter dynamiquement un widget notifications supplémentaire
    function addNotificationsWidget() {
      Dashboard.addWidget('dashboard-root', {
        type: 'notifications',
        title: '🔔 Nouvelles Alertes',
        data: [
          { type: 'info', title: 'Widget ajouté dynamiquement !', message: 'Ce widget a été injecté sans rechargement de page.' }
        ]
      });
    }

    // Reset du layout
    function resetDashboard() {
      localStorage.removeItem('dashboard_layout');
      window.location.reload();
    }
  </script>

</body>
</html>
