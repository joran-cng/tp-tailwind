<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Tailwind CSS - Carte</title>
    <link href="./output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-lg shadow-md w-full max-w-sm p-6 flex flex-col group hover:scale-[1.02] hover:shadow-xl transition-all duration-300 cursor-pointer">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=80&w=400&h=200"
         alt="Sneakers rouges en édition limitée"
         class="w-full h-48 object-cover rounded-t-lg group-hover:opacity-90 transition-opacity duration-300">

    <div class="mt-4 flex flex-col flex-grow">
        <h2 class="font-bold text-xl mb-2 text-gray-900">Sneakers Édition Limitée</h2>

        <p class="text-gray-700 text-base mb-4">
            Ces sneakers au design exclusif vous offrent un confort optimal et un style incomparable pour vos sorties
            urbaines.
        </p>
    </div>

    <button class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-4 py-2 rounded-md transition duration-300 w-full mt-auto">
        En savoir plus
    </button>

</div>

</body>
</html>
